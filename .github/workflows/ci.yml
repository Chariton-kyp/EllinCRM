# =============================================================================
# EllinCRM — Continuous Integration
#
# Verification-only pipeline for a portfolio / showcase repository. On every
# push and pull request it runs the backend + frontend test suites, static
# analysis, and a vulnerability scan.
#
# Intentionally omitted:
#
#   - Deployment / image publishing — the project ships no production
#     environment, and publishing would need registry credentials that do
#     not belong in a public repo.
#   - Live integration tests — they need LLM credentials (ANTHROPIC_API_KEY,
#     GOOGLE_API_KEY, …) that are neither available nor appropriate for a
#     public repo's Actions runner.
#   - Docker image smoke-build — the backend image pulls ~2.5 GB of ML
#     dependencies (torch, transformers, sentence-transformers, langgraph),
#     so a cold build takes 25–45 minutes per run for no extra guarantee
#     beyond what the unit/build jobs above already give us. Developers
#     verify Docker locally via `docker compose --profile dev up --build`.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel any in-flight run on the same ref so a rapid sequence of pushes
# doesn't pile up idle Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ============================================
  # Backend Tests
  # ============================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ellincrm
          POSTGRES_PASSWORD: ellincrm_dev
          POSTGRES_DB: ellincrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-anyio httpx

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ellincrm:ellincrm_dev@localhost:5432/ellincrm_test
          ENVIRONMENT: test
        run: |
          # Exclude integration tests — they hit a live backend / LLM APIs
          # and cannot run in CI without credentials and a seeded database.
          pytest tests/ -v -m "not integration" --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # ============================================
  # Frontend Tests & Build
  # ============================================
  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ============================================
  # Code Quality
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install ruff black isort mypy

      - name: Run Ruff (linting)
        working-directory: backend
        run: ruff check app/ --output-format=github || true

      - name: Run Black (formatting check)
        working-directory: backend
        run: black --check app/ || true

      - name: Run isort (import sorting)
        working-directory: backend
        run: isort --check-only app/ || true

  # ============================================
  # Security Scan
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        # Pin to a specific release — never use @master for third-party actions.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: ''
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
