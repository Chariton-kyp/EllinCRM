# Golden set for the v2 chat agent.
#
# Each entry is a Greek query the agent should handle, with explicit
# expectations on:
#   - category: taxonomy tag (aggregate / semantic / lookup / hybrid / chitchat)
#   - expected_tools: tool names the agent MUST call (order-independent for
#     parallel calls; use a single-element list for "call exactly this one").
#     Empty list means NO tools should be called (chitchat).
#   - forbidden_tools: tool names the agent must NOT call (e.g. search_records
#     is forbidden for aggregate queries because it would return top-k ≠ total).
#   - must_contain: substrings that MUST appear in the final answer (partial
#     case-insensitive match). Numbers are the load-bearing assertions for
#     aggregate queries.
#   - must_not_contain: substrings forbidden in the answer (e.g. English
#     fallback words, obviously wrong numbers).
#
# Prerequisites for running:
#   1. Docker stack up with current DB state (25 seed records expected)
#   2. Qwen3-Embedding re-indexed via `python -m scripts.reembed_all`
#   3. Anthropic API key configured
#
# Run:
#   cd backend && pytest tests/test_chat_golden.py -v

# ============================================================================
# CATEGORY: AGGREGATE — must use count_records / aggregate_invoice_field /
# group_by_dimension. Never use search_records (it returns top-k, not total).
# ============================================================================

- id: aggregate_invoice_count
  query: "Πόσα τιμολόγια έχουμε συνολικά;"
  category: aggregate
  expected_tools: [count_records]
  forbidden_tools: [search_records]
  must_contain: ["9"]
  must_not_contain: ["3"]

- id: aggregate_email_count
  query: "Πόσα emails έχουμε;"
  category: aggregate
  expected_tools: [count_records]
  forbidden_tools: [search_records]
  must_contain: ["10"]

- id: aggregate_form_count
