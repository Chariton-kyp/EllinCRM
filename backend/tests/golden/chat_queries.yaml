  category: aggregate
  expected_tools: [count_records]
  forbidden_tools: [search_records]
  must_contain: ["5"]

- id: aggregate_pending_count
  query: "Πόσες εγγραφές είναι σε εκκρεμότητα;"
  category: aggregate
  expected_tools: [count_records]
  forbidden_tools: [search_records]
  must_contain: ["εκκρεμ"]

- id: aggregate_total_revenue
  query: "Ποιο είναι το συνολικό ποσό όλων των τιμολογίων;"
  category: aggregate
  expected_tools: [aggregate_invoice_field]
  forbidden_tools: [search_records]
  must_contain: ["€"]

- id: aggregate_avg_invoice
  query: "Ποιος είναι ο μέσος όρος των τιμολογίων μας;"
  category: aggregate
